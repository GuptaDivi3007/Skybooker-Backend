server:
  port: 8085

spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:mysql://localhost:3306/booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Guddan#@02

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

booking:
  tax-rate: 0.18
  meal-price: 300.0
  baggage-price-per-kg: 500.0
  pnr-length: 6
  seat-hold-minutes: 15

services:
  flight-service:
    base-url: http://flight-service
  seat-service:
    base-url: http://seat-service
  passenger-service:
    base-url: http://passenger-service
  payment-service:
    base-url: http://payment-service
  notification-service:
    base-url: http://notification-service
notification:
  exchange: skybooker.notification.exchange
  booking-confirmed-routing-key: booking.confirmed
  booking-cancelled-routing-key: booking.cancelled
  booking-status-routing-key: booking.status
